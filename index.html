<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎁 Ruleta de Regalos</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .gift-container {
            background: rgba(255,248,225,0.92);
            border-radius: 80px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            padding: 25px 20px 35px;
            max-width: 700px;
            width: 100%;
        }
        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .fixed-arrow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .fixed-arrow svg {
            width: 50px;
            height: 50px;
            transform: rotate(180deg);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        canvas {
            background: #fef1cf;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 0 10px #ffd966, 0 0 0 15px #b87c2e;
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }
        .spin-btn {
            background: radial-gradient(circle at 30% 10%, #ffd966, #e6a017);
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 60px;
            color: #2c1a0c;
            box-shadow: 0 8px 0 #8b5a2b;
            cursor: pointer;
            margin-top: 10px;
            width: 80%;
        }
        .spin-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #8b5a2b; }
        .spin-btn.disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; transform: none; }
        .form-panel {
            background: #2e241f;
            border-radius: 48px;
            padding: 20px;
            margin-top: 20px;
            color: #ffefcf;
            text-align: center;
        }
        .form-panel input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            margin: 10px 0;
            text-align: center;
        }
        .result-card {
            background: #473b2e;
            border-radius: 40px;
            padding: 16px;
            margin: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .gift-highlight {
            background: #ffcd7e;
            color: #3b280f;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 1.4rem;
            display: inline-block;
        }
        .warning-message {
            background: #d4451ecc;
            border-radius: 50px;
            padding: 10px;
            font-size: 0.9rem;
        }
        .admin-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 10px;
            cursor: pointer;
        }
        .admin-panel {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 15px;
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
            display: none;
        }
        .registro-item {
            background: #333;
            padding: 8px;
            margin: 5px 0;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .sync-status { font-size: 0.7rem; margin-top: 8px; color: #aaa; }
        footer { font-size: 0.7rem; margin-top: 15px; opacity: 0.6; }
        @media (max-width: 560px) {
            .spin-btn { font-size: 1.4rem; width: 90%; }
            .fixed-arrow svg { width: 38px; height: 38px; }
        }
    </style>
</head>
<body>
<div class="gift-container">
    <!-- RULETA CON FLECHA -->
    <div class="wheel-wrapper">
        <div class="fixed-arrow">
            <svg viewBox="0 0 100 100">
                <polygon points="50,10 20,45 40,45 40,90 60,90 60,45 80,45" fill="#FFD966" stroke="#B87C2E" stroke-width="3"/>
                <circle cx="50" cy="25" r="6" fill="#B87C2E"/>
            </svg>
        </div>
        <canvas id="wheelCanvas" width="550" height="550"></canvas>
    </div>
    
    <div style="text-align: center;">
        <button id="spinButton" class="spin-btn">🎲 GIRAR 🎁</button>
    </div>

    <div class="form-panel">
        <div id="resultArea" class="result-card">🎀 ¡Gira para tu regalo! 🎀</div>
        
        <!-- ========== CAMPOS: NOMBRE Y TELÉFONO ========== -->
        <input type="text" id="clienteNombre" placeholder="👤 Tu nombre completo" autocomplete="off">
        <input type="tel" id="clienteTelefono" placeholder="📱 Tu número de teléfono" autocomplete="off">
        
        <div id="blockMessage" class="warning-message" style="display: none;"></div>
        <div id="syncStatus" class="sync-status">🔄 Conectando...</div>
        
        <button class="admin-btn" id="adminToggleBtn">📋 Ver ganadores (dueño)</button>
        <div id="adminPanel" class="admin-panel">
            <input type="password" id="adminPassword" placeholder="Clave (12345)" style="width:150px; margin:10px auto; display:block;">
            <button id="unlockAdminBtn" style="padding:5px 15px; border-radius:20px;">🔓 Entrar</button>
            <div id="adminContent" style="display: none; margin-top:15px;">
                <h4>🏆 GANADORES</h4>
                <div id="registroLista">Cargando...</div>
                <button id="exportarBtn" style="margin-top:10px; padding:5px; border-radius:20px;">📎 Exportar</button>
            </div>
        </div>
        <footer>✨ Un giro por persona ✨</footer>
    </div>
</div>

<script>
    
    // ==========================================
    // 🔥 TU CONFIGURACIÓN DE FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAEL1H4poO2fCOl5Dom_Lz5CEU4mCmtzMY",
        authDomain: "agnash-4b584.firebaseapp.com",
        projectId: "agnash-4b584",
        storageBucket: "agnash-4b584.firebasestorage.app",
        messagingSenderId: "566401836949",
        appId: "1:566401836949:web:f3908f3e8d57f85adfb89c",
        measurementId: "G-Z150EV0PDW"
    };
    //=================================================

    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // ==========================================
    // 🎁 REGALOS (CAMBIA AQUÍ)
    // ==========================================
    const PREMIOS = [
        { nombre: "                    ",   color: "#FF6B6B",  icono: "🎮" },
        { nombre: "                    ", color: "#4ECDC4",  icono: "🧸" },
        { nombre: "                    ",  color: "#FFE66D",  icono: "💎" },
        { nombre: "                    ",      color: "#D4A5A5",  icono: "🍫" },
        { nombre: "                    ",    color: "#9B5DE5",  icono: "🎧" },
        { nombre: "                    ",           color: "#F15BB5",  icono: "📚" },
        { nombre: "                    ",         color: "#00BBF9",  icono: "🌸" },
        { nombre: "                    ",    color: "#00F5D4",  icono: "🍿" }
    ];
    //==================================================
    //==================================================
    const ADMIN_CLAVE = "12345";  // Cambia la clave aquí
    // =================================================
    //==================================================
    
    const NUM_PREMIOS = PREMIOS.length;
    const ANGULO = (Math.PI * 2) / NUM_PREMIOS;
    
    let canvas = document.getElementById('wheelCanvas');
    let ctx = canvas.getContext('2d');
    let width, height;
    let rotacionActual = 0;
    let girando = false;
    let animacionId = null;
    let startTime = 0;
    let anguloFinal = 0;
    let yaGiro = false;
    let deviceId = localStorage.getItem('device_id');
    if (!deviceId) {
        deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substring(2);
        localStorage.setItem('device_id', deviceId);
    }
    
    // Elementos
    const spinBtn = document.getElementById('spinButton');
    const resultArea = document.getElementById('resultArea');
    const blockMsg = document.getElementById('blockMessage');
    const clienteNombre = document.getElementById('clienteNombre');
    const clienteTelefono = document.getElementById('clienteTelefono');
    const syncStatus = document.getElementById('syncStatus');
    const adminPanel = document.getElementById('adminPanel');
    const adminToggleBtn = document.getElementById('adminToggleBtn');
    const unlockAdminBtn = document.getElementById('unlockAdminBtn');
    const adminPassword = document.getElementById('adminPassword');
    const adminContent = document.getElementById('adminContent');
    const registroLista = document.getElementById('registroLista');
    const exportarBtn = document.getElementById('exportarBtn');
    
    // ==========================================
    // 🔄 FUNCIONES DE FIREBASE
    // ==========================================
    
    async function verificarSiYaGiro() {
        try {
            const doc = await db.collection('giros').doc(deviceId).get();
            if (doc.exists) {
                yaGiro = true;
                const premio = doc.data().premio;
                resultArea.innerHTML = `🎁 <span class="gift-highlight">${premio}</span> 🎁<br>✅ Ya reclamaste tu premio ✅`;
                spinBtn.classList.add('disabled');
                blockMsg.style.display = "block";
                blockMsg.innerText = "🔒 Ya giraste la ruleta. ¡Gracias!";
                document.getElementById('clienteNombre').style.display = 'none';
                document.getElementById('clienteTelefono').style.display = 'none';
                return true;
            }
        } catch(e) {
            console.error("Error al verificar:", e);
            syncStatus.innerText = "⚠️ Error de conexión";
        }
        return false;
    }
    
    async function guardarPremio(nombre, telefono, premioTexto) {
        try {
            await db.collection('giros').doc(deviceId).set({
                nombre: nombre,
                telefono: telefono,
                premio: premioTexto,
                fecha: new Date().toISOString(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('historial').add({
                nombre: nombre,
                telefono: telefono,
                premio: premioTexto,
                fecha: new Date().toISOString(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            syncStatus.innerText = "✅ Premio guardado";
            return true;
        } catch(e) {
            console.error("Error al guardar:", e);
            syncStatus.innerText = "⚠️ Error al guardar";
            return false;
        }
    }
    
    async function cargarGanadores() {
        try {
            const snapshot = await db.collection('historial')
                .orderBy('timestamp', 'desc')
                .limit(30)
                .get();
            
            if (snapshot.empty) {
                registroLista.innerHTML = 'No hay ganadores aún';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const fecha = data.fecha ? new Date(data.fecha).toLocaleString() : 'Fecha?';
                html += `<div class="registro-item">
                            <strong>${data.nombre || 'Anónimo'}</strong>
                            <span style="font-size:0.7rem;">${data.telefono || 'Sin teléfono'}</span>
                            <span style="background:#ffcd7e; color:#000; padding:2px 12px; border-radius:20px;">${data.premio}</span>
                            <span style="font-size:0.65rem;">${fecha}</span>
                        </div>`;
            });
            registroLista.innerHTML = html;
        } catch(e) {
            registroLista.innerHTML = 'Error: ¿Firestore creado? Verifica reglas';
            console.error(e);
        }
    }
    
    // ==========================================
    // 🎨 DIBUJAR RULETA
    // ==========================================
    
    function dibujarRuleta(rotacion) {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        const cx = width/2, cy = height/2;
        const radio = width * 0.44;
        
        for (let i = 0; i < NUM_PREMIOS; i++) {
            const inicio = i * ANGULO + rotacion;
            const fin = (i+1) * ANGULO + rotacion;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radio, inicio, fin);
            ctx.fillStyle = PREMIOS[i].color;
            ctx.fill();
            ctx.strokeStyle = "#FFF";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(inicio + ANGULO/2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `bold ${Math.max(14, width * 0.04)}px "Segoe UI Emoji"`;
            ctx.fillStyle = "#1F1A15";
            let texto = `${PREMIOS[i].icono} ${PREMIOS[i].nombre}`;
            if (texto.length > 12 && width < 450) texto = `${PREMIOS[i].icono} ${PREMIOS[i].nombre.substring(0,8)}..`;
            ctx.fillText(texto, radio * 0.7, 6);
            ctx.restore();
        }
        
        ctx.beginPath();
        ctx.arc(cx, cy, radio*0.12, 0, 2*Math.PI);
        ctx.fillStyle = "#F4C542";
        ctx.fill();
        ctx.fillStyle = "#8B4513";
        ctx.font = `bold ${Math.max(18, width*0.045)}px sans-serif`;
        ctx.fillText("🎁", cx-10, cy+6);
    }
    
    function obtenerPremio(rotacion) {
        const anguloFlecha = -Math.PI / 2;
        let anguloNorm = ((anguloFlecha % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
        for (let i = 0; i < NUM_PREMIOS; i++) {
            let inicio = (i * ANGULO + rotacion) % (2*Math.PI);
            let fin = ((i+1) * ANGULO + rotacion) % (2*Math.PI);
            if (inicio < fin) {
                if (anguloNorm >= inicio && anguloNorm < fin) return i;
            } else {
                if (anguloNorm >= inicio || anguloNorm < fin) return i;
            }
        }
        return 0;
    }

    
    // ==========================================
    // 🎡 ANIMACIÓN DE GIRO
    // ==========================================

    
    function animarGiro(tiempoActual) {
        if (!girando) return;
        const elapsed = tiempoActual - startTime;
        let t = Math.min(1, elapsed / 2200);
        const ease = 1 - Math.pow(1 - t, 3);
        const rotActual = (anguloFinal * ease) % (Math.PI * 2);
        rotacionActual = rotActual;
        dibujarRuleta(rotacionActual);
        
        if (t >= 1) {
            girando = false;
            const indice = obtenerPremio(rotacionActual);
            const premio = PREMIOS[indice];
            const nombre = clienteNombre.value.trim();
            const telefono = clienteTelefono.value.trim();
            
            if (!nombre) {
                resultArea.innerHTML = `🎉 <span class="gift-highlight">${premio.icono} ${premio.nombre}</span> 🎉<br>🎁 ¡Felicidades! 🎁`;
            } else {
                resultArea.innerHTML = `🎉 ¡${nombre}! 🎉<br><span class="gift-highlight">${premio.icono} ${premio.nombre}</span><br>🎁 ¡Felicidades! 🎁`;
            }
            
            guardarPremio(nombre || 'Anónimo', telefono || '', `${premio.icono} ${premio.nombre}`);
            yaGiro = true;
            spinBtn.classList.add('disabled');
            blockMsg.style.display = "block";
            blockMsg.innerText = "✅ ¡Giro completado! ✅";
            document.getElementById('clienteNombre').style.display = 'none';
            document.getElementById('clienteTelefono').style.display = 'none';
        } else {
            animacionId = requestAnimationFrame(animarGiro);
        }
    }
    
    function iniciarGiro() {
        const nombre = clienteNombre.value.trim();
        if (!nombre) {
            alert('Ingresa tu nombre para participar');
            return;
        }
        if (girando || yaGiro) return;
        
        const vueltas = 6 + Math.floor(Math.random() * 8);
        anguloFinal = rotacionActual + (vueltas * 2 * Math.PI) + (Math.random() * Math.PI * 2);
        startTime = performance.now();
        girando = true;
        spinBtn.classList.add('disabled');
        animacionId = requestAnimationFrame(animarGiro);
    }
    //**************************************************************************************
    // ==========================================
    // 📏 REDIMENSIÓN
    // ==========================================
    function redimensionar() {
        const container = document.querySelector('.wheel-wrapper');
        const maxSize = Math.min(container.clientWidth, 550);
        canvas.width = maxSize;
        canvas.height = maxSize;
        width = canvas.width;
        height = canvas.height;
        dibujarRuleta(rotacionActual);
    }
    window.addEventListener('resize', redimensionar);

    
    // ==========================================
    // 🔐 PANEL DE ADMIN
    // ==========================================
    
    adminToggleBtn.onclick = () => {
        adminPanel.style.display = adminPanel.style.display === 'none' ? 'block' : 'none';
        adminContent.style.display = 'none';
        adminPassword.value = '';
    };
    
    unlockAdminBtn.onclick = () => {
        if (adminPassword.value === ADMIN_CLAVE) {
            adminContent.style.display = 'block';
            cargarGanadores();
        } else {
            alert('Clave incorrecta');
        }
    };
    
    exportarBtn.onclick = async () => {
        try {
            const snapshot = await db.collection('historial').orderBy('timestamp', 'desc').get();
            let texto = "GANADORES DE LA RULETA\n\n";
            snapshot.forEach(doc => {
                const d = doc.data();
                texto += `${d.fecha ? new Date(d.fecha).toLocaleString() : 'Fecha?'} | ${d.nombre} | ${d.telefono || 'Sin teléfono'} | ${d.premio}\n`;
            });
            const blob = new Blob([texto], {type: "text/plain"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `ganadores_${Date.now()}.txt`;
            link.click();
        } catch(e) {
            alert("Error al exportar");
        }
    };







    
//*****************************************************************************
    //**************************************************************************





    
    // ==========================================
    // 🚀 INICIO
    // ==========================================
    async function inicio() {
        redimensionar();
        spinBtn.onclick = iniciarGiro;
        await verificarSiYaGiro();
        if (!yaGiro) {
            syncStatus.innerText = "✅ Listo para girar";
        }
    }
    
    inicio();
</script>
</body>
</html>
